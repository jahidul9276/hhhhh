version: '3.8'
services:
  xrdp:
    build: .
    container_name: xrdp
    privileged: true
    ports:
      - "3389:3389"
    restart: unless-stopped
    environment:
      - DISPLAY=:10
      - XDG_RUNTIME_DIR=/run/user/0
      - PULSE_RUNTIME_PATH=/run/pulse
      - PULSE_SERVER=unix:/run/pulse/native
      - HOME=/root
      - USER=root
      - XAUTHORITY=/root/.Xauthority
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - xrdp-data:/var/lib/xrdp
    cap_add:
      - SYS_ADMIN
      - DAC_READ_SEARCH
      - NET_ADMIN
      - IPC_LOCK
    security_opt:
      - apparmor:unconfined
      - seccomp=unconfined
    tmpfs:
      - /run:exec
      - /tmp:exec
    healthcheck:
      test: ["CMD", "pgrep", "xrdp"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  xrdp-data:
