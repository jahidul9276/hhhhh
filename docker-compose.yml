version: '3.8'
services:
  xrdp:
    build: .
    container_name: xrdp
    privileged: true
    ports:
      - "3389:3389"
    restart: unless-stopped
    environment:
      - DISPLAY=:0
      - XDG_RUNTIME_DIR=/tmp
      - PULSE_RUNTIME_PATH=/run/pulse
      - PULSE_SERVER=unix:/run/pulse/native
      - DBUS_SESSION_BUS_ADDRESS=unix:path=/run/dbus/system_bus_socket
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /run/user/1000/pulse:/run/pulse/host:ro
      - xrdp-data:/var/lib/xrdp
      - dbus-data:/run/dbus
      - pulse-data:/run/pulse
    cap_add:
      - SYS_ADMIN
      - DAC_READ_SEARCH
      - NET_ADMIN
      - IPC_LOCK
      - SYS_CHROOT
    security_opt:
      - apparmor:unconfined
      - seccomp=unconfined
    devices:
      - /dev/snd:/dev/snd:rw
      - /dev/dri:/dev/dri:rw
    tmpfs:
      - /run:exec
      - /tmp:exec
    healthcheck:
      test: ["CMD", "pgrep", "xrdp"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  xrdp-data:
  dbus-data:
  pulse-data:
