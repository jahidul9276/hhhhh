version: '3.8'

services:
  xrdp:
    build: .
    container_name: xrdp
    privileged: true
    ports:
      - "3389:3389"
    restart: unless-stopped
    environment:
      - DISPLAY=:10
      - XDG_RUNTIME_DIR=/run/user/1000
      - PULSE_RUNTIME_PATH=/run/pulse
      - PULSE_SERVER=unix:/run/pulse/native
      - HOME=/home/xrdpuser
      - USER=xrdpuser
      - XAUTHORITY=/home/xrdpuser/.Xauthority
      - DBUS_SESSION_BUS_ADDRESS=unix:path=/run/dbus/system_bus_socket
      - TERM=xterm-256color
      - LANG=en_US.UTF-8
      - LC_ALL=en_US.UTF-8
      - DISPLAY_WIDTH=1920
      - DISPLAY_HEIGHT=1080
      - ALLOW_ROOT_LOGIN=true
      - DISABLE_AUTHENTICATION=true
    volumes:
      - xrdp-data:/var/lib/xrdp
      - xrdp-logs:/var/log
    cap_add:
      - ALL
    security_opt:
      - apparmor:unconfined
      - seccomp=unconfined
    tmpfs:
      - /run:exec,suid,dev,size=512M
      - /tmp:exec,suid,dev,size=512M
      - /dev/shm:exec,suid,dev,size=512M
    healthcheck:
      test: ["CMD", "pgrep", "xrdp"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  xrdp-data:
    driver: local
  xrdp-logs:
    driver: local
