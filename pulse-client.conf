# PulseAudio client configuration for xrdp

# Use the local pulseaudio server
default-server = /run/pulse/native

# Disable autospawn to avoid multiple instances
autospawn = no

# Use the system pulseaudio daemon
daemon-binary = /usr/bin/pulseaudio

# Extra arguments for pulseaudio
extra-arguments = --exit-idle-time=-1 --system --realtime

# Cookie file for authentication
cookie-file = /root/.config/pulse/cookie

# Enable shared memory for better performance
enable-shm = yes

# Enable realtime scheduling
realtime-scheduling = yes

# Log level (0-4)
log-level = 1

# Resample method
resample-method = speex-float-1

# Default fragment size
default-fragment-size-msec = 10

# Default number of fragments
default-fragments = 4

# Allow TCP connections (for remote pulseaudio)
# tcp: address = 127.0.0.1 port = 4713
